name: Q41 Channel Scanner
version: "1.0.0"
slug: q41_channel_scanner
description: Scan channels and generate M3U
url: https://github.com/arabia153/ha-geniatech-bridge
startup: once
boot: manual
host_network: true
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

options:
  bridge_host: 192.168.0.28
  bridge_port: 30012
  service_ids:
    - 1
    - 2
    - 3
    - 4
    - 5
  pid_candidates:
    - none
    - all
  timeout_seconds: 10
  output_m3u: /share/genidtv_channels.m3u

schema:
  bridge_host: str
  bridge_port: int
  service_ids:
    - int
  pid_candidates:
    - str
  timeout_seconds: int
  output_m3u: str
