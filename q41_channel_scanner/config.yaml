name: Q41 Channel Scanner
version: "1.0.0"
slug: q41_channel_scanner
description: Scan channels and generate M3U
url: https://github.com/arabia153/ha-geniatech-bridge
startup: once
boot: manual
host_network: true
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

options:
  bridge_host: 192.168.0.28
  bridge_port: 30012
  frequencies:
    - 485.0
  service_ids:
    - 1
  pid_candidates:
    - none
  profile: pass
  timeout_seconds: 10
  output_m3u: /share/genidtv_channels.m3u

schema:
  bridge_host: str
  bridge_port: int
  frequencies:
    - float
  service_ids:
    - int
  pid_candidates:
    - str
  profile: str
  timeout_seconds: int
  output_m3u: str
